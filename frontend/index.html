<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEWSROOM — ข่าวล่าสุด</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Sarabun:wght@300;400;500&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root {
            --bg: #f0ece4;
            --surface: #e8e2d9;
            --border: #d8d0c4;
            --accent: #1a3a6b;
            --text: #1a1a1a;
            --muted: #888880;
            --card-bg: #faf8f5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Sarabun', sans-serif;
            font-weight: 300;
        }

        /* ── Header ── */
        header {
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }

        .masthead {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--accent);
        }

        .masthead span {
            color: var(--text);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        #ws-badge {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.65rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #bbb;
            transition: background 0.3s;
        }

        .dot.connected {
            background: #2ecc71;
            animation: pulse 2s infinite;
        }

        .dot.error {
            background: #e74c3c;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.4;
                transform: scale(0.8);
            }
        }

        /* ── Ticker ── */
        .ticker-wrap {
            background: var(--accent);
            color: #fff;
            overflow: hidden;
            height: 32px;
            display: flex;
            align-items: center;
        }

        .ticker-label {
            background: #0d2244;
            color: #fff;
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 0 1rem;
            height: 100%;
            display: flex;
            align-items: center;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .ticker-track {
            display: flex;
            animation: ticker 120s linear infinite;
            white-space: nowrap;
        }

        .ticker-track span {
            font-size: 0.75rem;
            font-weight: 400;
            padding: 0 2rem;
        }

        .ticker-track span::after {
            content: " ◆ ";
            opacity: 0.4;
        }

        @keyframes ticker {
            from {
                transform: translateX(0);
            }

            to {
                transform: translateX(-50%);
            }
        }

        /* ── Container ── */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* ── Stats ── */
        .stats-strip {
            display: flex;
            gap: 2rem;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .stat {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .stat-num {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            line-height: 1;
        }

        .stat-label {
            font-size: 0.65rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
        }

        /* ── Toolbar ── */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .filter-label {
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
            margin-right: 0.25rem;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 0.35rem 0.9rem;
            font-family: 'Sarabun', sans-serif;
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.05em;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .search-box {
            margin-left: auto;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.35rem 0.9rem;
            font-family: 'Sarabun', sans-serif;
            font-size: 0.78rem;
            width: 220px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box:focus {
            border-color: var(--accent);
        }

        .search-box::placeholder {
            color: var(--muted);
        }

        /* ── Grid ── */
        #news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1px;
            background: var(--border);
            margin-bottom: 2rem;
        }

        /* ── Card ── */
        .card {
            background: var(--card-bg);
            display: flex;
            flex-direction: column;
            transition: background 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeUp 0.35s forwards;
            position: relative;
        }

        .card:hover {
            background: #eee8df;
        }

        .card.is-new {
            border-left: 3px solid var(--accent);
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* card image */
        .card-img-wrap {
            width: 100%;
            height: 180px;
            overflow: hidden;
            flex-shrink: 0;
            background: var(--surface);
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s;
        }

        .card:hover .card-img {
            transform: scale(1.03);
        }

        /* card body */
        .card-body {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.65rem;
            flex: 1;
        }

        .card-source {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .src-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .source-name {
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .badge-new {
            font-size: 0.6rem;
            color: var(--accent);
            margin-left: auto;
            letter-spacing: 0.1em;
            font-weight: 500;
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-weight: 700;
            line-height: 1.4;
            color: var(--text);
        }

        .card-summary {
            font-size: 0.82rem;
            line-height: 1.65;
            color: #555;
            flex: 1;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border);
            margin-top: auto;
        }

        .card-time {
            font-size: 0.65rem;
            letter-spacing: 0.08em;
            color: var(--muted);
        }

        .card-arrow {
            color: var(--accent);
            font-size: 0.75rem;
            transition: transform 0.2s;
        }

        .card:hover .card-arrow {
            transform: translateX(4px);
        }

        .summary-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 2;
            background: rgba(26, 58, 107, 0.92);
            color: #fff;
            border: none;
            padding: 0.4rem 0.7rem;
            font-family: 'Sarabun', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.15s, background 0.2s, opacity 0.2s;
        }

        .summary-btn:hover {
            transform: translateY(-1px);
            background: rgba(13, 34, 68, 0.95);
        }

        .summary-btn.is-disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        /* ── Pagination ── */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem 0 2rem;
        }

        .page-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            width: 36px;
            height: 36px;
            font-family: 'Sarabun', sans-serif;
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page-btn:hover,
        .page-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .page-btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
        }

        .page-info {
            font-size: 0.7rem;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 0 0.5rem;
        }

        /* ── Loading ── */
        .loading {
            grid-column: 1/-1;
            text-align: center;
            padding: 4rem;
            color: var(--muted);
            font-size: 0.85rem;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Toast ── */
        #toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--accent);
            color: #fff;
            padding: 0.75rem 1.25rem;
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.3s;
            z-index: 200;
            cursor: pointer;
        }

        #toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        #updated-bar {
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            color: var(--muted);
            text-align: right;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        @media(max-width:600px) {
            header {
                padding: 0 1rem;
            }

            .container {
                padding: 1rem;
            }

            #news-grid {
                grid-template-columns: 1fr;
            }

            .stats-strip {
                gap: 1.25rem;
            }

            .search-box {
                width: 100%;
                margin-left: 0;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="masthead">NEWS<span>ROOM</span></div>
        <div class="header-right">
            <div id="ws-badge">
                <div class="dot" id="ws-dot"></div>
                <span id="ws-label">กำลังเชื่อมต่อ...</span>
            </div>
        </div>
    </header>

    <div class="ticker-wrap">
        <div class="ticker-label">Breaking</div>
        <div class="ticker-track" id="ticker-track">
            <span>กำลังโหลด...</span>
        </div>
    </div>

    <div class="container">

        <div class="stats-strip">
            <div class="stat">
                <div class="stat-num" id="stat-total">—</div>
                <div class="stat-label">บทความทั้งหมด</div>
            </div>
            <div class="stat">
                <div class="stat-num" id="stat-new">0</div>
                <div class="stat-label">ข่าวใหม่ (session)</div>
            </div>
        </div>

        <div class="toolbar" id="toolbar-filters">
            <span class="filter-label">กรอง :</span>
            <button class="filter-btn active" data-source="">ทั้งหมด</button>
            <input class="search-box" id="search-input" type="text" placeholder="ค้นหาข่าว...">
        </div>

        <div id="updated-bar">อัปเดตล่าสุด: —</div>
        <div id="news-grid">
            <div class="loading">
                <div class="spinner"></div>กำลังโหลด...
            </div>
        </div>
        <div class="pagination" id="pagination"></div>
    </div>

    <div id="toast" onclick="dismissToast()"></div>

    <script src="app.js"></script>
</body>

</html>
