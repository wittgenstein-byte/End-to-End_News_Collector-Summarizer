<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEWSROOM — ข่าวล่าสุด</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Sarabun:wght@300;400;500&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root {
            --bg: #f0ece4;
            --surface: #e8e2d9;
            --border: #d8d0c4;
            --accent: #1a3a6b;
            --text: #1a1a1a;
            --muted: #888880;
            --card-bg: #faf8f5;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Sarabun', sans-serif;
            font-weight: 300;
        }

        /* ── Header ── */
        header {
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }

        .masthead {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--accent);
        }

        .masthead span {
            color: var(--text);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        #ws-badge {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.65rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #bbb;
            transition: background 0.3s;
        }

        .dot.connected {
            background: #2ecc71;
            animation: pulse 2s infinite;
        }

        .dot.error {
            background: #e74c3c;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.4;
                transform: scale(0.8);
            }
        }

        /* ── Ticker ── */
        .ticker-wrap {
            background: var(--accent);
            color: #fff;
            overflow: hidden;
            height: 32px;
            display: flex;
            align-items: center;
        }

        .ticker-label {
            background: #0d2244;
            color: #fff;
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 0 1rem;
            height: 100%;
            display: flex;
            align-items: center;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .ticker-track {
            display: flex;
            animation: ticker 120s linear infinite;
            white-space: nowrap;
        }

        .ticker-track span {
            font-size: 0.75rem;
            font-weight: 400;
            padding: 0 2rem;
        }

        .ticker-track span::after {
            content: " ◆ ";
            opacity: 0.4;
        }

        @keyframes ticker {
            from {
                transform: translateX(0);
            }

            to {
                transform: translateX(-50%);
            }
        }

        /* ── Container ── */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* ── Stats ── */
        .stats-strip {
            display: flex;
            gap: 2rem;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .stat {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .stat-num {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            line-height: 1;
        }

        .stat-label {
            font-size: 0.65rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
        }

        /* ── Toolbar ── */
        .toolbar {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .filter-label {
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
            margin-right: 0.25rem;
        }

        .filter-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 0.35rem 0.9rem;
            font-family: 'Sarabun', sans-serif;
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.05em;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .search-box {
            margin-left: auto;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.35rem 0.9rem;
            font-family: 'Sarabun', sans-serif;
            font-size: 0.78rem;
            width: 220px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-box:focus {
            border-color: var(--accent);
        }

        .search-box::placeholder {
            color: var(--muted);
        }

        /* ── Grid ── */
        #news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1px;
            background: var(--border);
            margin-bottom: 2rem;
        }

        /* ── Card ── */
        .card {
            background: var(--card-bg);
            display: flex;
            flex-direction: column;
            transition: background 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeUp 0.35s forwards;
        }

        .card:hover {
            background: #eee8df;
        }

        .card.is-new {
            border-left: 3px solid var(--accent);
        }

        @keyframes fadeUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* card image */
        .card-img-wrap {
            width: 100%;
            height: 180px;
            overflow: hidden;
            flex-shrink: 0;
            background: var(--surface);
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.3s;
        }

        .card:hover .card-img {
            transform: scale(1.03);
        }

        /* card body */
        .card-body {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.65rem;
            flex: 1;
        }

        .card-source {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .src-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .source-name {
            font-size: 0.65rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .badge-new {
            font-size: 0.6rem;
            color: var(--accent);
            margin-left: auto;
            letter-spacing: 0.1em;
            font-weight: 500;
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-weight: 700;
            line-height: 1.4;
            color: var(--text);
        }

        .card-summary {
            font-size: 0.82rem;
            line-height: 1.65;
            color: #555;
            flex: 1;
        }

        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border);
            margin-top: auto;
        }

        .card-time {
            font-size: 0.65rem;
            letter-spacing: 0.08em;
            color: var(--muted);
        }

        .card-arrow {
            color: var(--accent);
            font-size: 0.75rem;
            transition: transform 0.2s;
        }

        .card:hover .card-arrow {
            transform: translateX(4px);
        }

        .src-thaipbs {
            background: #e74c3c;
        }

        .src-bangkok {
            background: #3498db;
        }

        .src-matichon {
            background: #2ecc71;
        }

        .src-101world {
            background: #9b59b6;
        }

        .src-default {
            background: var(--accent);
        }

        /* ── Pagination ── */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 1rem 0 2rem;
        }

        .page-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            width: 36px;
            height: 36px;
            font-family: 'Sarabun', sans-serif;
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .page-btn:hover,
        .page-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        .page-btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
        }

        .page-info {
            font-size: 0.7rem;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 0 0.5rem;
        }

        /* ── Loading ── */
        .loading {
            grid-column: 1/-1;
            text-align: center;
            padding: 4rem;
            color: var(--muted);
            font-size: 0.85rem;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Toast ── */
        #toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--accent);
            color: #fff;
            padding: 0.75rem 1.25rem;
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            opacity: 0;
            transform: translateY(8px);
            transition: all 0.3s;
            z-index: 200;
            cursor: pointer;
        }

        #toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        #updated-bar {
            font-size: 0.65rem;
            letter-spacing: 0.1em;
            color: var(--muted);
            text-align: right;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        @media(max-width:600px) {
            header {
                padding: 0 1rem;
            }

            .container {
                padding: 1rem;
            }

            #news-grid {
                grid-template-columns: 1fr;
            }

            .stats-strip {
                gap: 1.25rem;
            }

            .search-box {
                width: 100%;
                margin-left: 0;
            }
        }
        
        /* ── Modal ── */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-content {
            background: var(--card-bg);
            border-radius: 8px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            padding: 2rem;
            position: relative;
            transform: translateY(20px);
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }
        .modal-close {
            position: absolute;
            top: 1rem; right: 1.5rem;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--muted);
        }
        .modal-close:hover { color: var(--accent); }
        .summary-btn {
            background: rgba(26, 58, 107, 0.1);
            color: var(--accent);
            border: none;
            padding: 0.3rem 0.6rem;
            border-radius: 4px;
            font-size: 0.7rem;
            cursor: pointer;
            font-family: 'Sarabun', sans-serif;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            margin-left: auto;
            margin-right: 0.75rem;
        }
        .summary-btn:hover {
            background: var(--accent);
            color: #fff;
        }
        .summary-meta {
            font-size: 0.75rem;
            color: var(--muted);
            margin-bottom: 1rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .summary-tag {
            background: #eee;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
        }
        .summary-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 1rem;
        }
        .summary-body {
            font-size: 0.95rem;
            line-height: 1.6;
            color: #444;
        }
        .summary-bullets {
            margin-top: 1rem;
            padding-left: 1.2rem;
        }
        .summary-bullets li {
            margin-bottom: 0.5rem;
        }
    </style>
</head>

<body>

    <header>
        <div class="masthead">NEWS<span>ROOM</span></div>
        <div class="header-right">
            <div id="ws-badge">
                <div class="dot" id="ws-dot"></div>
                <span id="ws-label">กำลังเชื่อมต่อ...</span>
            </div>
        </div>
    </header>

    <div class="ticker-wrap">
        <div class="ticker-label">Breaking</div>
        <div class="ticker-track" id="ticker-track">
            <span>กำลังโหลด...</span>
        </div>
    </div>

    <div class="container">

        <div class="stats-strip">
            <div class="stat">
                <div class="stat-num" id="stat-total">—</div>
                <div class="stat-label">บทความทั้งหมด</div>
            </div>
            <div class="stat">
                <div class="stat-num" id="stat-new">0</div>
                <div class="stat-label">ข่าวใหม่ (session)</div>
            </div>
        </div>

        <div class="toolbar">
            <span class="filter-label">กรอง :</span>
            <button class="filter-btn active" data-source="">ทั้งหมด</button>
            <button class="filter-btn" data-source="ThaiPBS">ThaiPBS</button>
            <button class="filter-btn" data-source="Bangkok Post">Bangkok Post</button>
            <button class="filter-btn" data-source="Matichon">Matichon</button>
            <button class="filter-btn" data-source="101 World">101 World</button>
            <input class="search-box" id="search-input" type="text" placeholder="ค้นหาข่าว...">
        </div>

        <div id="updated-bar">อัปเดตล่าสุด: —</div>
        <div id="news-grid">
            <div class="loading">
                <div class="spinner"></div>กำลังโหลด...
            </div>
        </div>
        <div class="pagination" id="pagination"></div>
    </div>

    <div id="toast" onclick="dismissToast()"></div>

    <div class="modal-overlay" id="summary-modal" onclick="closeSummaryModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeSummaryModal(event)">&times;</span>
            <div id="summary-loading" style="display:none; text-align: center; padding: 2rem;">
                <div class="spinner"></div>กำลังสรุปข่าวโดย AI...
            </div>
            <div id="summary-result" style="display:none;"></div>
        </div>
    </div>

    <script>
        const API = "http://localhost:5000/api/news";
        let currentPage = 1;
        let activeSource = "";
        let searchQuery = "";
        let totalNew = 0;
        let newArticles = [];
        let searchTimer = null;

        // ── WebSocket ─────────────────────────────────────────────
        const socket = io("http://localhost:5000");

        socket.on("connect", () => {
            setWsBadge(true);
        });
        socket.on("disconnect", () => {
            setWsBadge(false);
        });
        socket.on("init", (data) => {
            document.getElementById("stat-total").textContent = data.total ?? "—";
            document.getElementById("updated-bar").textContent = `อัปเดตล่าสุด : ${data.updated}`;
            fetchPage(1);
        });
        socket.on("new_articles", (data) => {
            totalNew += data.count;
            document.getElementById("stat-new").textContent = totalNew;
            document.getElementById("stat-total").textContent = data.total;
            document.getElementById("updated-bar").textContent = `อัปเดตล่าสุด : ${data.updated}`;
            newArticles = [...data.articles, ...newArticles];
            updateTicker(data.articles.map(a => a.title));
            showToast(`✨ มีข่าวใหม่ ${data.count} บทความ — คลิกเพื่อดู`);
        });

        function setWsBadge(ok) {
            document.getElementById("ws-dot").className = "dot " + (ok ? "connected" : "error");
            document.getElementById("ws-label").textContent = ok ? "Live" : "ออฟไลน์";
        }

        // ── Fetch page ────────────────────────────────────────────
        async function fetchPage(page) {
            currentPage = page;
            document.getElementById("news-grid").innerHTML =
                `<div class="loading"><div class="spinner"></div>กำลังโหลด...</div>`;

            const params = new URLSearchParams({ page });
            if (activeSource) params.set("source", activeSource);
            if (searchQuery) params.set("q", searchQuery);

            try {
                const res = await fetch(`${API}?${params}`);
                const data = await res.json();
                renderGrid(data);
                renderPagination(data);
                document.getElementById("stat-total").textContent = data.total;
                document.getElementById("updated-bar").textContent = `อัปเดตล่าสุด : ${data.updated}`;
                updateTicker(data.news.slice(0, 15).map(n => n.title));
            } catch (e) {
                document.getElementById("news-grid").innerHTML =
                    `<div class="loading">❌ เชื่อมต่อ API ไม่ได้</div>`;
            }
        }

        // ── Render grid ───────────────────────────────────────────
        function renderGrid(data) {
            const grid = document.getElementById("news-grid");
            if (!data.news.length) {
                grid.innerHTML = `<div class="loading">ไม่พบข่าว</div>`;
                return;
            }
            const newUrls = new Set(newArticles.map(a => a.url));
            grid.innerHTML = data.news.map((n, i) => `
      <a class="card ${newUrls.has(n.url) ? "is-new" : ""}"
         href="${n.url || '#'}" target="_blank" rel="noopener"
         style="animation-delay:${i * 25}ms">
        ${n.image_url
                    ? `<div class="card-img-wrap">
               <img class="card-img" src="${esc(n.image_url)}" alt=""
                    loading="lazy" onerror="this.parentElement.style.display='none'">
             </div>`
                    : ""}
        <div class="card-body">
          <div class="card-source">
            <span class="src-dot ${srcClass(n.source)}"></span>
            <span class="source-name">${esc(n.source)}</span>
            ${newUrls.has(n.url) ? '<span class="badge-new">NEW</span>' : ""}
          </div>
          <div class="card-title">${esc(n.title)}</div>
          <div class="card-summary">${esc(n.summary || "")}</div>
          <div class="card-footer">
            <span class="card-time">${n.fetched_at || ""}</span>
            <button class="summary-btn" onclick="summarizeNews(event, '${esc(n.url)}')">⭐ สรุป</button>
            <span class="card-arrow">→</span>
          </div>
        </div>
      </a>
    `).join("");
        }

        // ── Pagination ────────────────────────────────────────────
        function renderPagination(data) {
            const pg = document.getElementById("pagination");
            if (data.total_pages <= 1) { pg.innerHTML = ""; return; }

            const { page, total_pages } = data;
            let html = "";
            html += `<button class="page-btn" onclick="fetchPage(${page - 1})" ${page <= 1 ? "disabled" : ""}>‹</button>`;

            const start = Math.max(1, page - 2);
            const end = Math.min(total_pages, start + 4);
            if (start > 1) html += `<button class="page-btn" onclick="fetchPage(1)">1</button><span class="page-info">…</span>`;
            for (let p = start; p <= end; p++) {
                html += `<button class="page-btn ${p === page ? "active" : ""}" onclick="fetchPage(${p})">${p}</button>`;
            }
            if (end < total_pages) html += `<span class="page-info">…</span><button class="page-btn" onclick="fetchPage(${total_pages})">${total_pages}</button>`;

            html += `<button class="page-btn" onclick="fetchPage(${page + 1})" ${page >= total_pages ? "disabled" : ""}>›</button>`;
            html += `<span class="page-info">${data.total} บทความ</span>`;
            pg.innerHTML = html;
        }

        // ── Ticker ────────────────────────────────────────────────
        function updateTicker(titles) {
            if (!titles.length) return;
            const doubled = [...titles, ...titles];
            document.getElementById("ticker-track").innerHTML =
                doubled.map(t => `<span>${esc(t)}</span>`).join("");
        }

        // ── Filter ────────────────────────────────────────────────
        document.querySelectorAll(".filter-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                activeSource = btn.dataset.source;
                fetchPage(1);
            });
        });

        // ── Search ────────────────────────────────────────────────
        document.getElementById("search-input").addEventListener("input", e => {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(() => {
                searchQuery = e.target.value.trim();
                fetchPage(1);
            }, 400);
        });

        // ── Toast ─────────────────────────────────────────────────
        function showToast(msg) {
            const t = document.getElementById("toast");
            t.textContent = msg;
            t.classList.add("show");
        }
        function dismissToast() {
            document.getElementById("toast").classList.remove("show");
            fetchPage(1);
        }

        // ── Summary Modal ─────────────────────────────────────────
        async function summarizeNews(event, url) {
            event.preventDefault();
            event.stopPropagation();
            
            const modal = document.getElementById('summary-modal');
            const loading = document.getElementById('summary-loading');
            const result = document.getElementById('summary-result');
            
            modal.classList.add('active');
            loading.style.display = 'block';
            result.style.display = 'none';
            result.innerHTML = '';
            
            try {
                const res = await fetch('http://localhost:5000/api/collect-md', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                
                const data = await res.json();
                
                if (data.ok && data.summary) {
                    const s = data.summary;
                    loading.style.display = 'none';
                    result.style.display = 'block';
                    
                    const bulletsHtml = (s.bullets || []).map(b => `<li>${esc(b)}</li>`).join('');
                    const keywordsHtml = (s.keywords || []).map(k => `<span class="summary-tag">#${esc(k)}</span>`).join('');
                    
                    result.innerHTML = `
                        <div class="summary-meta">
                            ${s.category ? `<span class="summary-tag">${esc(s.category)}</span>` : ''}
                            ${s.sentiment ? `<span class="summary-tag">${esc(s.sentiment)}</span>` : ''}
                            <span>${esc(s.published_at || '')}</span>
                        </div>
                        <h2 class="summary-title">${esc(s.title || 'ไม่มีหัวข้อ')}</h2>
                        <div class="summary-body">
                            <p><strong>สรุป:</strong> ${esc(s.summary || '')}</p>
                            ${bulletsHtml ? `<ul class="summary-bullets">${bulletsHtml}</ul>` : ''}
                            <div style="margin-top: 1.5rem; display: flex; gap: 0.5rem; flex-wrap: wrap;">
                                ${keywordsHtml}
                            </div>
                        </div>
                    `;
                } else {
                    throw new Error(data.error || 'เกิดข้อผิดพลาดในการสรุปข่าว');
                }
            } catch (err) {
                loading.style.display = 'none';
                result.style.display = 'block';
                result.innerHTML = `<div style="color: #e74c3c; text-align: center; padding: 2rem;">❌ ${esc(err.message)}</div>`;
            }
        }
        
        function closeSummaryModal(event) {
            if (event) event.stopPropagation();
            document.getElementById('summary-modal').classList.remove('active');
        }

        // ── Helpers ───────────────────────────────────────────────
        function srcClass(s) {
            if (s.includes("ThaiPBS")) return "src-thaipbs";
            if (s.includes("Bangkok")) return "src-bangkok";
            if (s.includes("Matichon")) return "src-matichon";
            if (s.includes("101")) return "src-101world";
            return "src-default";
        }
        function esc(s) {
            return String(s)
                .replace(/&/g, "&amp;").replace(/</g, "&lt;")
                .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
        }
    </script>
</body>

</html>
