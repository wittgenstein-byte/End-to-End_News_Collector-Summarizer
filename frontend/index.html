<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEWSROOM — ข่าวล่าสุด</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Sarabun:wght@300;400;500&display=swap"
        rel="stylesheet">

  <!-- Styles — browser cache ไฟล์นี้ได้ -->
  <link rel="stylesheet" href="/frontend/static/app.css">
</head>
<body>

  <!-- ── Header ── -->
  <header>
    <div class="masthead">NEWS<span>ROOM</span></div>
    <div class="header-right">
      <div id="ws-badge">
        <div class="dot" id="ws-dot"></div>
        <span id="ws-label">กำลังเชื่อมต่อ...</span>
      </div>
    </div>
  </header>

  <!-- ── Breaking news ticker ── -->
  <div class="ticker-wrap">
    <div class="ticker-label">Breaking</div>
    <div class="ticker-track" id="ticker-track">
      <span>กำลังโหลด...</span>
    </div>
  </div>

  <!-- ── Main ── -->
  <div class="container">

    <div class="stats-strip">
      <div class="stat">
        <div class="stat-num" id="stat-total">—</div>
        <div class="stat-label">บทความทั้งหมด</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="stat-new">0</div>
        <div class="stat-label">ข่าวใหม่ (session)</div>
      </div>
    </div>

    <div class="toolbar">
      <span class="filter-label">กรอง :</span>
      <button class="filter-btn active" data-source="">ทั้งหมด</button>
      <button class="filter-btn" data-source="ThaiPBS">ThaiPBS</button>
      <button class="filter-btn" data-source="Bangkok Post">Bangkok Post</button>
      <button class="filter-btn" data-source="Matichon">Matichon</button>
      <button class="filter-btn" data-source="101 World">101 World</button>
      <input class="search-box" id="search-input" type="text" placeholder="ค้นหาข่าว...">
    </div>

    <div id="updated-bar">อัปเดตล่าสุด: —</div>
    <div id="news-grid">
      <div class="loading"><div class="spinner"></div>กำลังโหลด...</div>
    </div>
    <div class="pagination" id="pagination"></div>

  </div>

  <!-- ── Toast ── -->
  <div id="toast"></div>

  <!-- ── Summary Modal ── -->
  <div class="modal-overlay" id="summary-modal">
    <div class="modal-content">
      <button class="modal-close" id="modal-close-btn">&times;</button>
      <div id="summary-loading" style="display:none; text-align:center; padding:2rem">
        <div class="spinner"></div>กำลังสรุปข่าวโดย AI...
      </div>
      <div id="summary-result" style="display:none"></div>
    </div>
  </div>

  <!-- Socket.IO (CDN) — โหลดก่อน main.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>

  <!-- App — type="module" ใช้ ES Module import/export ได้เลย -->
  <script type="module" src="/frontend/static/main.js"></script>

</body>
</html>
