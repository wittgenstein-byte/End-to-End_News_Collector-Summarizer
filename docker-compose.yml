services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PLAYWRIGHT_SERVICE_URL: http://playwright:8001/scrape
    volumes:
      - ./backend/.env:/app/.env:ro
      - app-data:/app/data
    depends_on:
      playwright:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:5000/readyz', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  playwright:
    build:
      context: ./playwright-service
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8001"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from urllib.request import urlopen; urlopen('http://127.0.0.1:8001/healthz', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  app-data:
